name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
      - run: make ci
      - name: Build
        run: |
          mkdir -p dist
          name="xvault-${{ matrix.goos }}-${{ matrix.goarch }}"
          version="${GITHUB_REF_NAME}"
          commit="${GITHUB_SHA}"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-s -w -X github.com/ecylmz/xvault/internal/app.version=${version} -X github.com/ecylmz/xvault/internal/app.commit=${commit} -X github.com/ecylmz/xvault/internal/app.date=${date}"
          mkdir -p "dist/${name}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -trimpath -ldflags="${ldflags}" -o "dist/${name}/xvault" ./cmd/xvault
          cp README.md LICENSE CHANGELOG.md "dist/${name}/"
          (cd dist && tar -czf "${name}.tar.gz" "${name}" && sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256")
      - uses: actions/upload-artifact@v7
        with:
          name: xvault-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Generate release notes
        run: sh tools/changelog_notes.sh "${GITHUB_REF_NAME}" > release-notes.md
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: dist/*
