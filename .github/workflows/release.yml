name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
      - run: go test ./...
      - run: make release-check
      - name: Build
        run: |
          mkdir -p dist
          name="xvault-${{ matrix.goos }}-${{ matrix.goarch }}"
          version="${GITHUB_REF_NAME}"
          commit="${GITHUB_SHA}"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-s -w -X github.com/ecylmz/xvault/internal/app.version=${version} -X github.com/ecylmz/xvault/internal/app.commit=${commit} -X github.com/ecylmz/xvault/internal/app.date=${date}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -trimpath -ldflags="${ldflags}" -o "dist/${name}" ./cmd/xvault
          sha256sum "dist/${name}" > "dist/${name}.sha256"
      - uses: actions/upload-artifact@v5
        with:
          name: xvault-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
